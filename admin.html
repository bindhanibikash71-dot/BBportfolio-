<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Workspace | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0a0a0c; --surface: #141418; --primary: #00f0ff; --secondary: #7000ff;
            --text: #e0e0e0; --border: #2a2a35; --danger: #ff3366; --success: #00e676;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); font-size: 15px; display: flex; height: 100vh; overflow: hidden; }
        h1, h2, h3 { font-family: 'Outfit', sans-serif; }

        .glass { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
        
        .btn { background: transparent; color: var(--text); border: 1px solid var(--border); padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .btn:hover { background: rgba(255,255,255,0.05); }
        .btn.primary { background: var(--primary); color: #000; border: none; }
        .btn.primary:hover { box-shadow: 0 0 15px rgba(0,240,255,0.4); }
        .btn.danger { background: rgba(255, 51, 102, 0.1); color: var(--danger); border-color: rgba(255, 51, 102, 0.3); }

        .input-box { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; outline:none; transition: 0.3s; }
        .input-box:focus { border-color: var(--primary); }

        /* Login Screen */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { width: 400px; padding: 40px; text-align: center; }

        /* App Layout */
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #999; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(0,240,255,0.1); color: var(--primary); }

        .main { flex: 1; overflow-y: auto; padding: 30px; background: var(--bg); }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .stat-card h2 { font-size: 2.5rem; color: var(--primary); }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: #999; font-weight: 400; text-transform: uppercase; font-size: 12px; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .status-badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status-pub { background: rgba(0,230,118,0.1); color: var(--success); }
        .status-draft { background: rgba(255,171,0,0.1); color: #ffab00; }

        .view-section { display: none; animation: fadeIn 0.3s; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        /* Rich Editor */
        .editor-tools { display: flex; gap: 5px; background: rgba(0,0,0,0.5); padding: 5px; border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0; }
        .editor-tools button { background: transparent; border: none; color: white; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .editor-tools button:hover { background: rgba(255,255,255,0.1); }
        #rich-editor { min-height: 250px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); border-radius: 0 0 8px 8px; padding: 15px; margin-bottom: 20px; outline: none; }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="glass login-box">
            <h1 style="margin-bottom: 10px;">WORKSPACE</h1>
            <p style="color: #999; margin-bottom: 30px;">Authorized personnel only.</p>
            <button class="btn primary" id="btn-login" style="width:100%; padding: 15px;"><i class="fa-brands fa-google"></i> Continue with Google</button>
            <div id="login-error" style="color: var(--danger); margin-top: 15px; font-size: 14px;"></div>
        </div>
    </div>

    <!-- App Screen -->
    <div id="app-screen" style="display:none; width: 100%;">
        
        <!-- Sidebar -->
        <div class="sidebar">
            <div style="font-family: 'Outfit'; font-size: 20px; font-weight: 700; color: white; padding: 10px 0 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;">
                BB_ADMIN <span style="display:inline-block; width:8px; height:8px; background:var(--success); border-radius:50%; margin-left:5px; box-shadow: 0 0 10px var(--success);"></span>
            </div>
            
            <div class="nav-item active" data-target="dashboard"><i class="fa-solid fa-chart-pie"></i> Overview</div>
            <div class="nav-item" data-target="manage"><i class="fa-solid fa-table-cells-large"></i> Projects</div>
            <div class="nav-item" data-target="add" onclick="resetForm()"><i class="fa-solid fa-plus"></i> Create New</div>
            
            <div style="flex:1"></div>
            
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                <img id="admin-img" src="" style="width: 40px; height: 40px; border-radius: 50%;">
                <div>
                    <div id="admin-name" style="font-weight: 600; color: white; font-size: 14px;">Admin</div>
                    <div style="font-size: 12px; color: #999;">Super User</div>
                </div>
            </div>
            <button class="btn danger" id="btn-logout" style="width: 100%;"><i class="fa-solid fa-power-off"></i> Logout</button>
        </div>

        <!-- Main Content -->
        <div class="main">
            <div class="topbar">
                <h2 id="page-title">Overview</h2>
                <div style="color: #999; font-size: 13px;">System Status: <span style="color: var(--success)">Online</span></div>
            </div>

            <!-- Dashboard -->
            <div id="dashboard" class="view-section active">
                <div class="stats-grid">
                    <div class="glass stat-card"><span style="color:#999">Total Projects</span><h2 id="s_proj">0</h2></div>
                    <div class="glass stat-card"><span style="color:#999">Total Views</span><h2 id="s_view">0</h2></div>
                    <div class="glass stat-card"><span style="color:#999">Total Likes</span><h2 id="s_like">0</h2></div>
                </div>
                
                <div class="glass" style="padding: 25px;">
                    <h3>Data Operations</h3>
                    <p style="color: #999; margin: 10px 0 20px 0; font-size: 14px;">Backup your Firestore database locally as a JSON file.</p>
                    <button class="btn primary" id="btn-export"><i class="fa-solid fa-download"></i> Download JSON Backup</button>
                </div>
            </div>

            <!-- Manage Projects -->
            <div id="manage" class="view-section">
                <div class="glass" style="padding: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                        <input type="text" class="input-box" placeholder="Search by title..." style="width: 300px; margin:0;" id="search-manage" onkeyup="renderTable()">
                        <button class="btn danger" id="btn-bulk-delete"><i class="fa-solid fa-trash"></i> Delete Selected</button>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 50px;"><input type="checkbox" id="selectAll"></th>
                                    <th>Project Title</th>
                                    <th>Category</th>
                                    <th>Stats</th>
                                    <th>Status</th>
                                    <th style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Add / Edit Form -->
            <div id="add" class="view-section">
                <div class="glass" style="padding: 30px; max-width: 900px;">
                    <input type="hidden" id="f_id">
                    
                    <div style="display: flex; gap: 20px;">
                        <div style="flex: 2;">
                            <label style="color:#999; font-size:13px; margin-bottom:5px; display:block;">Project Title</label>
                            <input type="text" id="f_title" class="input-box">
                        </div>
                        <div style="flex: 1;">
                            <label style="color:#999; font-size:13px; margin-bottom:5px; display:block;">Category</label>
                            <input type="text" id="f_cat" class="input-box">
                        </div>
                    </div>

                    <label style="color:#999; font-size:13px; margin-bottom:5px; display:block;">Cover Image URL</label>
                    <input type="text" id="f_img" class="input-box" oninput="document.getElementById('img-preview').src = this.value || 'https://via.placeholder.com/800x400?text=Preview'">
                    
                    <img id="img-preview" src="https://via.placeholder.com/800x400?text=Preview" style="width:100%; height:200px; object-fit:cover; border-radius:8px; margin-bottom:20px; border:1px solid var(--border);">

                    <label style="color:#999; font-size:13px; margin-bottom:5px; display:block;">Short Description</label>
                    <textarea id="f_desc" class="input-box" rows="3"></textarea>
                    
                    <div style="display: flex; gap: 20px;">
                        <div style="flex: 1;">
                            <label style="color:#999; font-size:13px; margin-bottom:5px; display:block;">Live URL</label>
                            <input type="text" id="f_live" class="input-box">
                        </div>
                        <div style="flex: 1;">
                            <label style="color:#999; font-size:13px; margin-bottom:5px; display:block;">Github URL</label>
                            <input type="text" id="f_git" class="input-box">
                        </div>
                    </div>

                    <label style="color:#999; font-size:13px; margin-bottom:5px; display:block;">Tech Stack (comma separated)</label>
                    <input type="text" id="f_tech" class="input-box" placeholder="React, Node.js, Firebase">

                    <label style="color:#999; font-size:13px; margin-bottom:5px; display:block;">Full Case Study (Rich Text)</label>
                    <div class="editor-tools">
                        <button type="button" onclick="document.execCommand('bold', false, null)"><i class="fa-solid fa-bold"></i></button>
                        <button type="button" onclick="document.execCommand('italic', false, null)"><i class="fa-solid fa-italic"></i></button>
                        <button type="button" onclick="document.execCommand('insertUnorderedList', false, null)"><i class="fa-solid fa-list"></i></button>
                        <button type="button" onclick="document.execCommand('formatBlock', false, 'H3')">H3</button>
                    </div>
                    <div id="rich-editor" contenteditable="true"></div>

                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 30px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px;">
                        <input type="checkbox" id="f_pub" checked style="width: 18px; height: 18px;">
                        <label for="f_pub">Publish immediately (Make visible to public)</label>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 15px;">
                        <button class="btn" onclick="document.querySelector('[data-target=\'manage\']').click()">Cancel</button>
                        <button class="btn primary" id="btn-save"><i class="fa-solid fa-cloud-arrow-up"></i> Save Project</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ REPLACE THIS WITH YOUR REAL CONFIG ⚠️
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // 🔐 SECURITY: ONLY YOUR EMAIL CAN LOGIN
        const ADMIN_EMAILS = ["your-email@gmail.com"]; 

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let projectsData = [];

        // Auth
        document.getElementById('btn-login').onclick = () => {
            document.getElementById('btn-login').innerHTML = "Authenticating...";
            signInWithPopup(auth, new GoogleAuthProvider()).catch(err => {
                document.getElementById('login-error').innerText = err.message;
                document.getElementById('btn-login').innerHTML = "<i class='fa-brands fa-google'></i> Continue with Google";
            });
        };
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user && ADMIN_EMAILS.includes(user.email)) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                document.getElementById('admin-name').innerText = user.displayName;
                document.getElementById('admin-img').src = user.photoURL;
                loadData();
            } else {
                if(user) signOut(auth);
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
                if(user) document.getElementById('login-error').innerText = "Security Breach: Unauthorized Email Address.";
                document.getElementById('btn-login').innerHTML = "<i class='fa-brands fa-google'></i> Continue with Google";
            }
        });

        // Navigation
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                e.currentTarget.classList.add('active');
                document.getElementById(e.currentTarget.getAttribute('data-target')).classList.add('active');
                document.getElementById('page-title').innerText = e.currentTarget.innerText;
            });
        });

        async function loadData() {
            const q = query(collection(db, "projects"), orderBy("createdAt", "desc"));
            const snaps = await getDocs(q);
            projectsData = [];
            let views=0, likes=0;
            snaps.forEach(d => {
                const data = {id: d.id, ...d.data()};
                projectsData.push(data);
                views += data.views || 0; likes += data.likes || 0;
            });
            
            document.getElementById('s_proj').innerText = projectsData.length;
            document.getElementById('s_view').innerText = views;
            document.getElementById('s_like').innerText = likes;
            
            renderTable();
        }

        window.renderTable = function() {
            const tbody = document.getElementById('table-body');
            const search = (document.getElementById('search-manage')?.value || "").toLowerCase();
            tbody.innerHTML = '';
            
            projectsData.filter(p => p.title.toLowerCase().includes(search)).forEach(p => {
                const status = p.isPublished ? `<span class="status-badge status-pub">Published</span>` : `<span class="status-badge status-draft">Draft</span>`;
                tbody.innerHTML += `
                    <tr>
                        <td><input type="checkbox" class="chk-delete" value="${p.id}"></td>
                        <td style="font-weight: 600;">${p.title}</td>
                        <td style="color:#999">${p.category || 'N/A'}</td>
                        <td style="font-size: 13px;"><i class="fa-solid fa-eye" style="color:var(--primary)"></i> ${p.views||0} &nbsp; <i class="fa-solid fa-heart" style="color:var(--danger)"></i> ${p.likes||0}</td>
                        <td>${status}</td>
                        <td style="text-align: right;">
                            <button class="btn" style="padding: 6px 12px; font-size:13px;" onclick="editProject('${p.id}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn danger" style="padding: 6px 12px; font-size:13px;" onclick="deleteProject('${p.id}')"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        document.getElementById('selectAll').onchange = (e) => {
            document.querySelectorAll('.chk-delete').forEach(c => c.checked = e.target.checked);
        };

        window.editProject = function(id) {
            const p = projectsData.find(x => x.id === id);
            document.getElementById('f_id').value = p.id;
            document.getElementById('f_title').value = p.title;
            document.getElementById('f_cat').value = p.category;
            document.getElementById('f_img').value = p.imageUrl;
            document.getElementById('img-preview').src = p.imageUrl || 'https://via.placeholder.com/800x400';
            document.getElementById('f_desc').value = p.description;
            document.getElementById('f_tech').value = (p.techStack||[]).join(', ');
            document.getElementById('f_live').value = p.projectUrl;
            document.getElementById('f_git').value = p.githubUrl || '';
            document.getElementById('rich-editor').innerHTML = p.fullDescription || '';
            document.getElementById('f_pub').checked = p.isPublished;
            
            document.querySelector('[data-target="add"]').click();
            document.getElementById('page-title').innerText = "Edit Project";
        }

        window.resetForm = function() {
            document.getElementById('f_id').value = "";
            document.getElementById('f_title').value = "";
            document.getElementById('f_cat').value = "";
            document.getElementById('f_img').value = "";
            document.getElementById('img-preview').src = 'https://via.placeholder.com/800x400?text=Preview';
            document.getElementById('f_desc').value = "";
            document.getElementById('f_tech').value = "";
            document.getElementById('f_live').value = "";
            document.getElementById('f_git').value = "";
            document.getElementById('rich-editor').innerHTML = "";
            document.getElementById('f_pub').checked = true;
            document.getElementById('page-title').innerText = "Create New Project";
        }

        document.getElementById('btn-save').onclick = async () => {
            const title = document.getElementById('f_title').value;
            if(!title) return alert("Title is required!");
            
            const btn = document.getElementById('btn-save');
            btn.innerText = "Saving...";
            
            const id = document.getElementById('f_id').value || "proj_" + Date.now();
            const data = {
                title: title,
                slug: title.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
                category: document.getElementById('f_cat').value,
                imageUrl: document.getElementById('f_img').value,
                description: document.getElementById('f_desc').value,
                techStack: document.getElementById('f_tech').value.split(',').map(s=>s.trim()).filter(s=>s),
                projectUrl: document.getElementById('f_live').value,
                githubUrl: document.getElementById('f_git').value,
                fullDescription: document.getElementById('rich-editor').innerHTML,
                isPublished: document.getElementById('f_pub').checked,
                updatedAt: serverTimestamp()
            };
            if(!document.getElementById('f_id').value) { data.createdAt = serverTimestamp(); data.views = 0; data.likes = 0; }
            
            await setDoc(doc(db, "projects", id), data, { merge: true });
            btn.innerHTML = "<i class='fa-solid fa-check'></i> Saved";
            setTimeout(() => { btn.innerHTML = "<i class='fa-solid fa-cloud-arrow-up'></i> Save Project"; }, 2000);
            
            resetForm();
            loadData();
        };

        window.deleteProject = async function(id) {
            if(confirm("Are you sure you want to delete this project? This action cannot be undone.")) {
                await deleteDoc(doc(db, "projects", id));
                loadData();
            }
        }

        document.getElementById('btn-bulk-delete').onclick = async () => {
            const chks = document.querySelectorAll('.chk-delete:checked');
            if(chks.length === 0) return alert("Select at least one project.");
            if(confirm(`Delete ${chks.length} projects?`)) {
                document.getElementById('btn-bulk-delete').innerText = "Deleting...";
                for(let c of chks) await deleteDoc(doc(db, "projects", c.value));
                document.getElementById('btn-bulk-delete').innerHTML = "<i class='fa-solid fa-trash'></i> Delete Selected";
                loadData();
            }
        }

        document.getElementById('btn-export').onclick = () => {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(projectsData));
            const a = document.createElement('a'); a.href = dataStr; a.download = "portfolio_backup.json"; a.click();
        }
    </script>
</body>
</html>
